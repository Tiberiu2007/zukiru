name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc-debug
            os: ubuntu-latest
            preset: debug
          - name: linux-gcc-release
            os: ubuntu-latest
            preset: release
          - name: linux-asan
            os: ubuntu-latest
            preset: asan

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # ninja + pkg-config, the native windowing backends (X11 + Wayland/
          # xkbcommon + wayland-scanner + protocol XML), and the Vulkan loader
          # and headers for the render module. The window/GPU tests themselves are
          # hidden ([.window]/[.gpu]/[.app]) and are not run headlessly, but every
          # backend still needs its dev libraries to *compile*.
          sudo apt-get install -y \
            ninja-build \
            pkg-config \
            libx11-dev \
            libwayland-dev libwayland-bin wayland-protocols \
            libxkbcommon-dev \
            libvulkan-dev

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure
